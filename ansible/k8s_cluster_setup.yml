---
# k8s_cluster_setup.yml — Bootstrap a Kubernetes cluster with Calico CNI.
#
# Expects inventory with k8s_ctrl and k8s_work sub-groups (generated by
# AnsibleInventoryGenerator).  The first control-plane node (k8s_ctrl[0])
# runs kubeadm init; remaining ctrl nodes join as control-plane; workers
# join without the --control-plane flag.
#
# Override variables via -e:
#   kube_version   — Kubernetes minor version for apt repo (default: 1.31)
#   calico_version — Calico release for Tigera operator (default: 3.29.2)
#   pod_cidr       — Pod network CIDR (default: 192.168.0.0/16, Calico default)

############################################################################
# Play 1 — Prerequisites on all k8s nodes
############################################################################
- name: Install Kubernetes prerequisites
  hosts: k8s
  become: yes
  gather_facts: yes
  vars:
    kube_version: "1.31"
    pod_cidr: "192.168.0.0/16"

  tasks:
    - name: Disable swap (runtime)
      ansible.builtin.command: swapoff -a
      changed_when: true

    - name: Remove swap entries from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '\sswap\s'
        state: absent

    - name: Load required kernel modules
      ansible.builtin.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules across reboots
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: "0644"

    - name: Set sysctl parameters for Kubernetes networking
      ansible.builtin.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: yes
      loop:
        - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { key: net.ipv4.ip_forward,                 value: "1" }

    - name: Install containerd
      ansible.builtin.apt:
        name: containerd
        state: present
        update_cache: yes

    - name: Create containerd config directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: Generate default containerd config
      ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Enable SystemdCgroup in containerd
      ansible.builtin.lineinfile:
        path: /etc/containerd/config.toml
        regexp: '^\s*SystemdCgroup\s*='
        line: "            SystemdCgroup = true"
      notify: Restart containerd

    - name: Enable and start containerd
      ansible.builtin.systemd:
        name: containerd
        enabled: yes
        state: started

    - name: Install kubeadm preflight dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
          - conntrack
          - socat
          - ebtables
          - ipset
        state: present

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Kubernetes apt signing key
      ansible.builtin.shell: >
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kube_version }}/deb/Release.key
        | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kube_version }}/deb/ /\n"
        mode: "0644"

    - name: Install kubeadm, kubelet, and kubectl
      ansible.builtin.apt:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: present
        update_cache: yes

    - name: Hold Kubernetes packages at current version
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubeadm
        - kubelet
        - kubectl

    - name: Enable kubelet service
      ansible.builtin.systemd:
        name: kubelet
        enabled: yes

  handlers:
    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted

############################################################################
# Play 2 — Initialize first control-plane node
############################################################################
- name: Initialize Kubernetes control plane
  hosts: k8s_ctrl[0]
  become: yes
  gather_facts: yes
  vars:
    pod_cidr: "192.168.0.0/16"

  tasks:
    - name: Check if cluster is already initialized
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_conf

    - name: Run kubeadm init
      ansible.builtin.command: >
        kubeadm init
        --pod-network-cidr={{ pod_cidr }}
        --control-plane-endpoint={{ ansible_host }}:6443
        --upload-certs
      register: kubeadm_init
      when: not kubeadm_conf.stat.exists

    - name: Create .kube directory for ansible user
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Copy admin kubeconfig for ansible user
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ ansible_user }}/.kube/config"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
        remote_src: yes

    - name: Generate join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: join_command_raw
      changed_when: false

    - name: Upload certs and get certificate key
      ansible.builtin.command: kubeadm init phase upload-certs --upload-certs
      register: cert_key_raw
      changed_when: false

    - name: Store join command as fact
      ansible.builtin.set_fact:
        k8s_join_command: "{{ join_command_raw.stdout }}"
        k8s_certificate_key: "{{ cert_key_raw.stdout_lines[-1] }}"

############################################################################
# Play 3 — Install Calico CNI
############################################################################
- name: Install Calico CNI
  hosts: k8s_ctrl[0]
  become: no
  gather_facts: no
  vars:
    calico_version: "3.29.2"
    pod_cidr: "192.168.0.0/16"

  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"

  tasks:
    - name: Apply Tigera operator manifest
      ansible.builtin.command: >
        kubectl apply --server-side --force-conflicts -f
        https://raw.githubusercontent.com/projectcalico/calico/v{{ calico_version }}/manifests/tigera-operator.yaml
      register: tigera_apply
      changed_when: "'created' in tigera_apply.stdout or 'configured' in tigera_apply.stdout"

    - name: Create Calico custom resources manifest
      ansible.builtin.copy:
        dest: /tmp/calico-custom-resources.yaml
        content: |
          apiVersion: operator.tigera.io/v1
          kind: Installation
          metadata:
            name: default
          spec:
            calicoNetwork:
              ipPools:
              - blockSize: 26
                cidr: {{ pod_cidr }}
                encapsulation: VXLANCrossSubnet
                natOutgoing: Enabled
                nodeSelector: all()
          ---
          apiVersion: operator.tigera.io/v1
          kind: APIServer
          metadata:
            name: default
          spec: {}
        mode: "0644"

    - name: Apply Calico custom resources
      ansible.builtin.command: kubectl apply -f /tmp/calico-custom-resources.yaml
      register: calico_apply
      changed_when: "'created' in calico_apply.stdout or 'configured' in calico_apply.stdout"

    - name: Wait for Calico pods to be ready
      ansible.builtin.command: >
        kubectl wait --for=condition=Available
        deployment/calico-kube-controllers
        -n calico-system
        --timeout=180s
      retries: 3
      delay: 15
      register: calico_wait
      until: calico_wait.rc == 0

############################################################################
# Play 4 — Join remaining control-plane nodes
############################################################################
- name: Join control-plane nodes
  hosts: k8s_ctrl[1:]
  become: yes
  serial: 1
  gather_facts: yes

  tasks:
    - name: Check if node has already joined
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Join as control-plane node
      ansible.builtin.command: >
        {{ hostvars[groups['k8s_ctrl'][0]]['k8s_join_command'] }}
        --control-plane
        --certificate-key {{ hostvars[groups['k8s_ctrl'][0]]['k8s_certificate_key'] }}
      when: not kubelet_conf.stat.exists

############################################################################
# Play 5 — Join worker nodes
############################################################################
- name: Join worker nodes
  hosts: k8s_work
  become: yes
  gather_facts: yes

  tasks:
    - name: Check if node has already joined
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Join as worker node
      ansible.builtin.command: >
        {{ hostvars[groups['k8s_ctrl'][0]]['k8s_join_command'] }}
      when: not kubelet_conf.stat.exists

############################################################################
# Play 6 — Verify cluster health
############################################################################
- name: Verify cluster health
  hosts: k8s_ctrl[0]
  become: no
  gather_facts: no
  vars:
    kube_version: "1.31"

  environment:
    KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"

  tasks:
    - name: Wait for all nodes to be Ready
      ansible.builtin.command: >
        kubectl wait --for=condition=Ready node --all --timeout=120s
      retries: 3
      delay: 10
      register: node_wait
      until: node_wait.rc == 0

    - name: Show cluster nodes
      ansible.builtin.command: kubectl get nodes -o wide
      register: node_list
      changed_when: false

    - name: Display cluster status
      ansible.builtin.debug:
        var: node_list.stdout_lines

    - name: Read kubeconfig for distribution
      ansible.builtin.slurp:
        src: "/home/{{ ansible_user }}/.kube/config"
      register: kubeconfig_b64

    # -- Copy kubeconfig and kubectl to linux utility server (delegated) ---------------

    - name: Add Kubernetes apt signing key on linux utility server
      ansible.builtin.shell: >
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kube_version }}/deb/Release.key
        | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      delegate_to: localhost
      become: yes

    - name: Add Kubernetes apt repository on linux utility server
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kube_version }}/deb/ /\n"
        mode: "0644"
      delegate_to: localhost
      become: yes

    - name: Install kubectl on linux utility server
      ansible.builtin.apt:
        name: kubectl
        state: present
        update_cache: yes
      delegate_to: localhost
      become: yes

    - name: Create .kube directory on linux utility server
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      delegate_to: localhost

    - name: Write kubeconfig to linux utility server
      ansible.builtin.copy:
        content: "{{ kubeconfig_b64['content'] | b64decode }}"
        dest: "/home/{{ ansible_user }}/.kube/config"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      delegate_to: localhost
