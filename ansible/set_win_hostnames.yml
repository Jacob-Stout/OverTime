---
- name: Set hostname on Windows servers based on ansible inventory
  hosts: ad:wutil:general
  gather_facts: false

  tasks:
    - name: Gather facts
      setup:

    - name: Disable IPv6 on all adapters
      win_shell: |
        Get-NetAdapterBinding -ComponentId ms_tcpip6 | Where-Object { $_.Enabled } | ForEach-Object {
            Disable-NetAdapterBinding -Name $_.Name -ComponentId ms_tcpip6
        }
      args:
        executable: powershell.exe
      register: ipv6_result
      changed_when: "'ms_tcpip6' in (ipv6_result.stdout | default(''))"

    - name: Update Windows hostname to match inventory name
      win_hostname:
        name: "{{ inventory_hostname }}"
      register: hostname_result

    - name: Reboot the Windows host
      win_shell: |
        Restart-Computer -Force
      when: hostname_result.changed
      ignore_errors: true

    - name: Wait for the Windows host to come back online
      wait_for_connection:
        delay: 10
        timeout: 300
      when: hostname_result.changed