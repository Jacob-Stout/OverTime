name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `overtime create my-spec.yml`
        2. ...
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Proxmox
        - Azure
    validations:
      required: true

  - type: dropdown
    id: scenario
    attributes:
      label: Scenario
      options:
        - ad-lab-xs
        - ad-lab-s
        - ad-lab-m
        - k8s-dev
        - jumphost
        - Other / custom
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.12"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 22.04 / WSL2"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste relevant output. **Redact any secrets, passwords, or IPs.**
      render: shell
    validations:
      required: false
