# OverTime Provisioning Spec — Azure Example
#
# This file demonstrates all configuration sections for an Azure deployment.
# Copy this file, fill in your values, and run:
#   overtime validate <your-spec.yml>
#   overtime network create <your-spec.yml>    # one-time: creates RG + VNet
#   overtime create <your-spec.yml>            # per-scenario: creates subnet + VMs
#   overtime configure <your-spec.yml>
#
# IMPORTANT: Azure deployments require two steps — shared network first,
# then per-scenario VMs.  Each scenario must use a unique subnet_cidr
# within the vnet_cidr.  Example layout for 10.0.0.0/16:
#   jumphost:   10.0.1.0/26   (IPs .1-.62)
#   ad-lab-s:   10.0.1.64/26  (IPs .65-.126)
#   ad-lab-m:   10.0.1.128/26 (IPs .129-.190)
#
# Authentication: the azurerm Terraform provider uses its own credential chain
# (Azure CLI > Service Principal > Managed Identity). Log in with `az login`
# before running overtime commands.
#
# Secrets — two options (pick one):
#   1. Environment variables (recommended): export ANSIBLE_PASSWORD=... before running overtime
#   2. 1Password: use op:// paths (e.g. ${secret:op://vault/item/field})
#   Alternatively, copy .env.example → .env and fill in values (read when secrets.backend = dotenv)

provider: azure

secrets:
  backend: envvars       # reads from environment variables; also supports "dotenv"

azure:
  subscription_id: "00000000-0000-0000-0000-000000000000"  # Azure subscription UUID
  resource_group: "ot-lab-m"                                # created by `overtime network create`
  location: "eastus"                                        # Azure region
  vnet_name: "ot-vnet"                                      # virtual network name
  vnet_cidr: "10.0.0.0/16"                                  # VNet address space (CIDR)
  subnet_cidr: "10.0.1.0/24"                                # subnet (must be within vnet_cidr)
  default_vm_size: "Standard_B2s"                            # default VM size; override per-VM in Terraform
  admin_username: "ot-bootstrap"                              # cannot be a reserved name (admin, root, etc.)
  allowed_source_prefix: "*"                                   # your public IP/CIDR (e.g. "203.0.113.5/32") for internet-facing labs

environment:
  environment_name_prefix: "lab"                 # prefix for VM names (1-10 chars)
  scenario: "ad-lab-m"                           # run 'overtime scenarios -p azure' for options
  environment_fqdn: "lab.local"                  # FQDN for the environment

ansible:
  ansible_user: "ot-bootstrap"                   # must match azure.admin_username
  ansible_password: "${secret:ansible_password}" # export ANSIBLE_PASSWORD=...
  ssh_pub_key: ""                                # SSH public key for Linux VMs (leave blank if not using key auth)
  # ssh_key: "~/.ssh/lab-key"                    # path to SSH private key (optional, required if using ssh_pub_key)

# Optional: linux utility server settings
jumphost:
  # ip: "10.0.1.10"       # explicit IP; use if connecting with public IP or if exposing with NAT

# Optional: explicit playbook sequence for `overtime configure`
configure:
  playbooks:
    - playbook: "primary_ad_setup.yml"
      targets: "ad"
      description: "Create AD forest"
    - playbook: "secondary_ad_setup.yml"
      targets: "ad"
      description: "Promote secondary DC"
    - playbook: "join_member_server.yml"
      targets: "general:wutil"
      description: "Join member servers to domain"
